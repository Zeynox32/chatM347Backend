name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      authentication-service: ${{ steps.filter.outputs.authentication-service }}
      user-service: ${{ steps.filter.outputs.user-service }}
      chat-service: ${{ steps.filter.outputs.chat-service }}
      gateway-service: ${{ steps.filter.outputs.gateway-service }}
      websocket-service: ${{ steps.filter.outputs.websocket-service }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'shared/**'
            authentication-service:
              - 'authentication-service/**'
            user-service:
              - 'user-service/**'
            chat-service:
              - 'chat-service/**'
            gateway-service:
              - 'gateway-service/**'
            websocket-service:
              - 'websocket-service/**'

  build:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - authentication-service
          - user-service
          - chat-service
          - gateway-service
          - websocket-service
    if: |
      (matrix.service == 'authentication-service' && (needs.changes.outputs.authentication-service == 'true' || needs.changes.outputs.shared == 'true')) ||
      (matrix.service == 'user-service' && (needs.changes.outputs.user-service == 'true' || needs.changes.outputs.shared == 'true')) ||
      (matrix.service == 'chat-service' && (needs.changes.outputs.chat-service == 'true' || needs.changes.outputs.shared == 'true')) ||
      (matrix.service == 'gateway-service' && (needs.changes.outputs.gateway-service == 'true' || needs.changes.outputs.shared == 'true')) ||
      (matrix.service == 'websocket-service' && (needs.changes.outputs.websocket-service == 'true' || needs.changes.outputs.shared == 'true'))
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and Test
        run: mvn -f pom.xml -pl ${{ matrix.service }} -am clean package

      - name: Build Docker Image
        run: docker build -t ${{ matrix.service }}:latest ./${{ matrix.service }}