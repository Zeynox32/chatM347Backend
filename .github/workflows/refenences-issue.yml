name: Require Issue Reference

on:
  pull_request:
    types: [opened, edited, reopened]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR
        run: |
          if ! echo "${{ github.event.pull_request.body }}" | grep -E "(Closes|Fixes) #[0-9]+"; then
            echo "PR must reference an Issue (Closes #123)"
            exit 1
          fi