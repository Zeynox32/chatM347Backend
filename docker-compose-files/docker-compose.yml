version: "3.9"

networks:
  chattrix-net:
    driver: bridge

volumes:
  mariadb-data:
  mongodb-data:
  redis-data:
  rabbitmq-data:
  caddy-data:
  caddy-config:

services:

  mariadb:
    image: mariadb:10.11
    container_name: chattrix-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./scripts/init-mariadb.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 700m

  mongodb:
    image: mongo:7
    container_name: chattrix-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_APP_DB}
      MONGO_APP_USER: ${MONGO_APP_USER}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
      MONGO_APP_DB: ${MONGO_APP_DB}
    volumes:
      - mongodb-data:/data/db
      - ./mongodb/init.sh:/docker-entrypoint-initdb.d/init-mongodb.sh:ro
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 500m

  mongo-init:
    image: mongo:7
    container_name: chattrix-mongo-init
    restart: "no"
    depends_on:
      - mongodb
    environment:
      MONGODB_HOST: mongodb
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_APP_USER: ${MONGO_APP_USER}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
      MONGO_APP_DB: ${MONGO_APP_DB}
    volumes:
      - ./mongodb/ensure-app-user.sh:/ensure-app-user.sh:ro
    entrypoint: ["bash", "/ensure-app-user.sh"]
    networks:
      - chattrix-net

  redis:
    image: redis:7-alpine
    container_name: chattrix-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 250m

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: chattrix-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 350m

  authentication-service:
    image: ghcr.io/${GHCR_OWNER}/chattrix-authentication-service:${IMAGE_TAG_AUTHENTICATION:-latest}
    container_name: chattrix-authentication-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 3001
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      AUTH_DB: authentication_service
      AUTH_USER: auth_user
      AUTH_PASSWORD: auth_password
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 1209600000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 350m

  user-service:
    image: ghcr.io/${GHCR_OWNER}/chattrix-user-service:${IMAGE_TAG_USER:-latest}
    container_name: chattrix-user-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 3002
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      USER_DB: user_service
      USER_USER: user_user
      USER_PASSWORD: user_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 350m

  chat-service:
    image: ghcr.io/${GHCR_OWNER}/chattrix-chat-service:${IMAGE_TAG_CHAT:-latest}
    container_name: chattrix-chat-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 3003
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DATABASE: ${MONGO_APP_DB}
      MONGO_APP_USER: ${MONGO_APP_USER}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 400m

  websocket-service:
    image: ghcr.io/${GHCR_OWNER}/chattrix-websocket-service:${IMAGE_TAG_WEBSOCKET:-latest}
    container_name: chattrix-websocket-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 3004
      FRONTEND_URL: ${PUBLIC_URL}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 350m

  gateway-service:
    image: ghcr.io/${GHCR_OWNER}/chattrix-gateway-service:${IMAGE_TAG_GATEWAY:-latest}
    container_name: chattrix-gateway-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 8080
      FRONTEND_URL: ${PUBLIC_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      - authentication-service
      - user-service
      - chat-service
      - websocket-service
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 350m

  frontend-service:
    image: ghcr.io/${GHCR_OWNER}/chattrix-frontend-service:${IMAGE_TAG_FRONTEND:-latest}
    container_name: chattrix-frontend-service
    restart: unless-stopped
    environment:
      VITE_GATEWAY_URL: ${PUBLIC_URL}
      VITE_WS_URL: ${PUBLIC_WS_URL}
    depends_on:
      - gateway-service
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 200m

  caddy:
    image: caddy:2-alpine
    container_name: chattrix-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend-service
      - gateway-service
    networks:
      - chattrix-net
    deploy:
      resources:
        limits:
          memory: 128m
